<h1 style="color: #1f6952">Test ADs ALVA</h1>
  <div
    class="container"
    style="
      background: #f4f4f4;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
    "
  >
    <h3>Resultado de Ads</h3>

    <div
      [hidden]="!hasValidCoordinates"
      #mapContainer
      style="
        height: 400px;
        width: 100%;
        margin-top: 20px;
        border: 1px solid #ccc;
      "
    ></div>

    <div *ngIf="!hasValidCoordinates">
      <p style="color: gray">
        Esperando datos de ubicación válidos para mostrar el mapa...
      </p>
    </div>

    <pre *ngIf="adsResult">{{ adsResult | json }}</pre>
  </div>

  <ng-template #noData>
    <p style="color: gray">Esperando respuesta del script de ads...</p>
  </ng-template>
</div>
