    <script>
      (function () {
        const { fetch: originalFetch } = window;
        window.fetch = async (...args) => {
          const response = await originalFetch(...args);
          if (
            typeof args[0] === "string" &&
            args[0].includes("helios-ads-backoffice")
          ) {
            const clone = response.clone();
            clone
              .json()
              .then((data) => {
                window.dispatchEvent(
                  new CustomEvent("adsDataCaptured", { detail: data }),
                );
              })
              .catch((err) =>
                console.error("Error parseando interceptor:", err),
              );
          }
          return response;
        };
      })();
    </script>
